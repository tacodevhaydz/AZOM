name: Dev Build

on:
  push:
    branches: [dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.xaml"
      - "libs/**"
      - "DeviceTemplates/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Compute dev version
        id: vars
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          latest_tag=${latest_tag:-v0.0.0}
          IFS=. read -r MAJ MIN PAT <<<"${latest_tag#v}"
          next="${MAJ}.${MIN}.$((PAT+1))"
          dev_version="${next}-dev.${short_sha}"
          commit_subject=$(git log -1 --pretty=%s)
          {
            echo "short_sha=${short_sha}"
            echo "latest_tag=${latest_tag}"
            echo "dev_version=${dev_version}"
            echo "commit_subject=${commit_subject}"
            echo "build_timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build plugin DLL
        run: dotnet build -c Release --no-restore /p:Version=${{ steps.vars.outputs.dev_version }}

      - name: Stage and zip release files
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item ./bin/x86/Release/MozaPlugin.dll $staging/
          Compress-Archive -Path ./staging/* -DestinationPath ./MozaPlugin_dev.zip

      - name: Publish sha-tagged pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.vars.outputs.short_sha }}
          name: "${{ steps.vars.outputs.dev_version }}"
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: MozaPlugin_dev.zip
          body: |
            ⚠️ **Pre-release — expect rough edges.** Use the latest stable release if you need reliability.

            **Version:** `${{ steps.vars.outputs.dev_version }}`
            **Commit:** [`${{ steps.vars.outputs.short_sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — ${{ steps.vars.outputs.commit_subject }}
            **Built:** ${{ steps.vars.outputs.build_timestamp }}
            **Changes since ${{ steps.vars.outputs.latest_tag }}:** https://github.com/${{ github.repository }}/compare/${{ steps.vars.outputs.latest_tag }}...${{ github.sha }}

            Stable link to most recent dev build: https://github.com/${{ github.repository }}/releases/tag/dev-latest

      - name: Reset dev-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release delete dev-latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish dev-latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "dev-latest (${{ steps.vars.outputs.dev_version }})"
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: MozaPlugin_dev.zip
          body: |
            ⚠️ **Pre-release — expect rough edges.** Use the latest stable release if you need reliability.

            Rolling pointer to newest dev build. For history, see [all dev releases](https://github.com/${{ github.repository }}/releases?q=dev-&expanded=true).

            **Version:** `${{ steps.vars.outputs.dev_version }}`
            **Commit:** [`${{ steps.vars.outputs.short_sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) — ${{ steps.vars.outputs.commit_subject }}
            **Built:** ${{ steps.vars.outputs.build_timestamp }}
            **Changes since ${{ steps.vars.outputs.latest_tag }}:** https://github.com/${{ github.repository }}/compare/${{ steps.vars.outputs.latest_tag }}...${{ github.sha }}
            **Pinned tag for this build:** [`dev-${{ steps.vars.outputs.short_sha }}`](https://github.com/${{ github.repository }}/releases/tag/dev-${{ steps.vars.outputs.short_sha }})

      - name: Prune dev-<sha> releases older than 60 days
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          cutoff=$(date -u -d '60 days ago' +%s)
          gh release list --repo "$GITHUB_REPOSITORY" --limit 500 \
            --json tagName,createdAt \
            --jq '.[] | select(.tagName | test("^dev-[0-9a-f]{7}$")) | "\(.tagName) \(.createdAt)"' \
          | while read -r tag created; do
              created_ts=$(date -u -d "$created" +%s)
              if [ "$created_ts" -lt "$cutoff" ]; then
                echo "Pruning $tag (created $created)"
                gh release delete "$tag" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
              fi
            done
