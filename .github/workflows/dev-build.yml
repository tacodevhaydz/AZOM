name: Dev Build

on:
  push:
    branches: [dev]
    paths:
      - "**.cs"
      - "**.csproj"
      - "**.sln"
      - "**.xaml"
      - "libs/**"
      - "DeviceTemplates/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Compute dev version
        id: vars
        shell: bash
        env:
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          latest_tag=${latest_tag:-v0.0.0}
          IFS=. read -r MAJ MIN PAT <<<"${latest_tag#v}"
          next="${MAJ}.${MIN}.$((PAT+1))"
          dev_version="${next}-dev.${short_sha}"

          # Determine the commit range for this push. PUSH_BEFORE is the
          # previous branch tip on push events; it's all-zeros on the first
          # push to a new branch and empty for workflow_dispatch. A force-push
          # leaves the previous tip unreachable, so verify before using it.
          if [[ -z "$PUSH_BEFORE" || "$PUSH_BEFORE" =~ ^0+$ ]] \
             || ! git rev-parse --verify "${PUSH_BEFORE}^{commit}" >/dev/null 2>&1; then
            commit_range="${GITHUB_SHA}~1..${GITHUB_SHA}"
            commit_count=1
          else
            commit_range="${PUSH_BEFORE}..${GITHUB_SHA}"
            commit_count=$(git rev-list --count "$commit_range")
          fi

          # Markdown bullet list of commits in this push, newest first, capped
          # to keep the Discord embed under its 4096-char description limit.
          commit_list=$(git log "$commit_range" \
            --max-count=15 \
            --pretty=format:"- [\`%h\`](https://github.com/${GITHUB_REPOSITORY}/commit/%H) — %s")
          if [ "$commit_count" -gt 15 ]; then
            commit_list="${commit_list}"$'\n'"- … and $((commit_count - 15)) more"
          fi

          {
            echo "short_sha=${short_sha}"
            echo "latest_tag=${latest_tag}"
            echo "dev_version=${dev_version}"
            echo "commit_count=${commit_count}"
            echo "build_timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "commit_list<<COMMIT_LIST_EOF"
            echo "$commit_list"
            echo "COMMIT_LIST_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build plugin DLL
        run: dotnet build -c Release --no-restore /p:Version=${{ steps.vars.outputs.dev_version }}

      - name: Stage and zip release files
        shell: pwsh
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item ./bin/x86/Release/MozaPlugin.dll $staging/
          Compress-Archive -Path ./staging/* -DestinationPath ./MozaPlugin_dev.zip

      - name: Publish sha-tagged pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ steps.vars.outputs.short_sha }}
          name: "${{ steps.vars.outputs.dev_version }}"
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: MozaPlugin_dev.zip
          body: |
            ⚠️ **Pre-release — expect rough edges.** Use the latest stable release if you need reliability.

            **Version:** `${{ steps.vars.outputs.dev_version }}`
            **Built:** ${{ steps.vars.outputs.build_timestamp }}
            **Commits in this build (${{ steps.vars.outputs.commit_count }}):**
            ${{ steps.vars.outputs.commit_list }}

            **Changes since ${{ steps.vars.outputs.latest_tag }}:** https://github.com/${{ github.repository }}/compare/${{ steps.vars.outputs.latest_tag }}...${{ github.sha }}

            Stable link to most recent dev build: https://github.com/${{ github.repository }}/releases/tag/dev-latest

      - name: Reset dev-latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release delete dev-latest --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true

      - name: Publish dev-latest pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "dev-latest (${{ steps.vars.outputs.dev_version }})"
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: true
          files: MozaPlugin_dev.zip
          body: |
            ⚠️ **Pre-release — expect rough edges.** Use the latest stable release if you need reliability.

            Rolling pointer to newest dev build. For history, see [all dev releases](https://github.com/${{ github.repository }}/releases?q=dev-&expanded=true).

            **Version:** `${{ steps.vars.outputs.dev_version }}`
            **Built:** ${{ steps.vars.outputs.build_timestamp }}
            **Commits in this build (${{ steps.vars.outputs.commit_count }}):**
            ${{ steps.vars.outputs.commit_list }}

            **Changes since ${{ steps.vars.outputs.latest_tag }}:** https://github.com/${{ github.repository }}/compare/${{ steps.vars.outputs.latest_tag }}...${{ github.sha }}
            **Pinned tag for this build:** [`dev-${{ steps.vars.outputs.short_sha }}`](https://github.com/${{ github.repository }}/releases/tag/dev-${{ steps.vars.outputs.short_sha }})

      - name: Notify Discord
        if: success()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          DEV_VERSION: ${{ steps.vars.outputs.dev_version }}
          COMMIT_COUNT: ${{ steps.vars.outputs.commit_count }}
          COMMIT_LIST: ${{ steps.vars.outputs.commit_list }}
          BUILT: ${{ steps.vars.outputs.build_timestamp }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/dev-${SHORT_SHA}"
          # Build the payload entirely inside jq so every interpolated value is
          # JSON-encoded safely. -a forces ASCII-only output so any non-ASCII
          # character (e.g. em-dash) is emitted as \uXXXX, eliminating any risk
          # of mis-encoded UTF-8 bytes on the Windows runner. Unicode-safe
          # slicing keeps us under Discord's embed limits (title 256 chars,
          # description 4096 chars).
          payload_file=$(mktemp)
          jq -an \
            --arg dev_version  "$DEV_VERSION" \
            --arg commit_count "$COMMIT_COUNT" \
            --arg commit_list  "$COMMIT_LIST" \
            --arg built        "$BUILT" \
            --arg release_url  "$release_url" \
            '{
              embeds: [{
                title: (("Moza SimHub Plugin — dev build " + $dev_version)[0:250]),
                url: $release_url,
                description: ((
                  "**Commits in this build (" + $commit_count + "):**\n" +
                  $commit_list +
                  "\n\n**Built:** " + $built +
                  "\n[Download release](" + $release_url + ")"
                )[0:4090]),
                color: 3447003
              }]
            }' > "$payload_file"
          # Strip any leading UTF-8 BOM (some Windows tooling adds one) and any
          # CR bytes — both are rejected by Discord's JSON parser.
          python -c "import sys, pathlib; p=pathlib.Path(sys.argv[1]); b=p.read_bytes(); b=b.lstrip(b'\xef\xbb\xbf').replace(b'\r', b''); p.write_bytes(b)" "$payload_file"
          response_file=$(mktemp)
          http_code=$(curl -sS -o "$response_file" -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -X POST --data-binary "@$payload_file" "$DISCORD_WEBHOOK_URL") || http_code="000"
          if [[ "$http_code" =~ ^2[0-9][0-9]$ ]]; then
            echo "Discord notification sent (HTTP $http_code)."
          else
            echo "::warning::Discord notification failed (HTTP $http_code)"
            echo "Payload bytes ($(wc -c < "$payload_file")):"
            cat "$payload_file"
            echo
            echo "Payload first 32 bytes (hex):"
            head -c 32 "$payload_file" | od -An -tx1
            echo "Response body:"
            cat "$response_file" || true
            echo
          fi
          rm -f "$response_file" "$payload_file"

      - name: Prune dev-<sha> releases superseded by a stable
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          latest_stable=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 500 \
            --json tagName \
            --jq '.[] | select(.tagName | test("^v[0-9]+\\.[0-9]+\\.[0-9]+$")) | .tagName' \
            | sort -V | tail -n1)
          if [ -z "$latest_stable" ]; then
            echo "No stable release found; skipping prune."
            exit 0
          fi
          latest_ver=${latest_stable#v}
          echo "Latest stable: v$latest_ver"
          gh release list --repo "$GITHUB_REPOSITORY" --limit 500 \
            --json tagName,name \
            --jq '.[] | select(.tagName | test("^dev-[0-9a-f]{7}$")) | "\(.tagName)\t\(.name)"' \
          | while IFS=$'\t' read -r tag name; do
              family="${name%-dev.*}"
              highest=$(printf '%s\n%s\n' "$family" "$latest_ver" | sort -V | tail -n1)
              if [ "$highest" = "$latest_ver" ]; then
                echo "Pruning $tag ($name) — superseded by v$latest_ver"
                gh release delete "$tag" --yes --cleanup-tag --repo "$GITHUB_REPOSITORY" || true
              else
                echo "Keeping $tag ($name) — current cycle (>$latest_ver)"
              fi
            done
