name: Release

on:
  push:
    tags:
      - "v*"

env:
  ReleaseFileName: MozaPlugin_${{ github.ref_name }}.zip

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build plugin DLL
        run: dotnet build -c Release --no-restore /p:Version=${{ steps.version.outputs.version }}

      - name: Stage release files
        run: |
          $staging = "staging"
          New-Item -ItemType Directory -Path $staging -Force
          Copy-Item ./bin/x86/Release/MozaPlugin.dll $staging/

      - name: Zip release files
        run: Compress-Archive -Path ./staging/* -DestinationPath ./${{ env.ReleaseFileName }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-file
          path: ${{ env.ReleaseFileName }}

  create-release:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-file

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: ${{ env.ReleaseFileName }}

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_RELEASE_WEBHOOK_URL not set; skipping notification."
            exit 0
          fi
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          commit_url="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          short_sha="${GITHUB_SHA:0:7}"
          built=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          commit_subject=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}" \
            --jq '.commit.message' | head -n1)
          description=$(printf '**Tag:** `%s`\n**Commit:** [`%s`](%s) — %s\n**Built:** %s\n[View release notes](%s)' \
            "$TAG" "$short_sha" "$commit_url" "$commit_subject" "$built" "$release_url")
          payload=$(jq -n \
            --arg title "Moza SimHub Plugin — release $TAG" \
            --arg url "$release_url" \
            --arg desc "$description" \
            '{embeds: [{title: $title, url: $url, description: $desc, color: 3066993}]}')
          curl -sS -f -H "Content-Type: application/json" -X POST -d "$payload" "$DISCORD_WEBHOOK_URL"
